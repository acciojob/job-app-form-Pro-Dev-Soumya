<!DOCTYPE html>

<html>

<head>
	<link rel="stylesheet" href="styles.css">
</head>

<body>
	<!-- the entire body must be written by student -->

<form method="post">

  <label for="name">Name *</label>
  <input id="name" name="name" type="text" required>
  <br>

  <label for="email">Email *</label>
  <input id="email" name="email" type="email" required>
  <br>

  <fieldset>
    <legend>Gender *</legend>

    <input id="male" name="gender" value="male" type="radio" required>
    <label for="male">Male</label>

    <input id="female" name="gender" value="female" type="radio" required>
    <label for="female">Female</label>
  </fieldset>
  <br>

  <label for="laptop">Laptop Brands</label>
  <select id="laptop" name="laptop">
    <option value="">--Select--</option>
    <option value="apple">Apple</option>
    <option value="asus">Asus</option>
    <option value="hp">HP</option>
  </select>
  <br>

  <label for="age">Age *</label>
  <input id="age" name="age" type="number" required>
  <br>

  <label for="dob">Date of Birth *</label>
  <input id="dob" name="dob" type="date" required>
  <br>

  <label for="password">Password *</label>
  <input id="password" name="password" type="password" required>
  <br>

  <label for="portfolio">Portfolio URL</label>
  <input id="portfolio" name="portfolio" type="url">
  <br>

  <button type="submit">Submit</button>

</form>

    <script type="text/javascript" src="./script.js">
</script>

</body>

</html>
