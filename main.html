<!DOCTYPE html>

<html>

<head>
	<link rel="stylesheet" href="styles.css">
</head>

<body>
	<!-- the entire body must be written by student -->

	<form method="post">
		<label for="name">Name *</label>
		<input id="name" type="text" name="name" required>
		<br>

		<label for="email">Email *</label>
		<input id="email" type="email" name="email" required>
		<br>

		<label>Gender *</label>
		<br>
		<label for="male"> Male</label>
		<input id="male" required name="gender" value="male" type="radio">
		<br>
		<label for="female">Female</label>
		<input id="female" required name="gender"  value="female" type="radio">
		<br>

		<label for="laptop">Laptop Brands</label>
		<select id="laptop" name="laptop">
			<option>--Select--</option>
			<option>Apple</option>
			<option>HP</option>
			<option>Asus</option>
		</select>
	<br>

		<label for="age">Age*</label>
		<input id="age" type="number" name="age" required>
		<br>
		<label for="dob">Date of Birth*</label>
		<input id="dob" type="date" name="dob" required>
		<br>
		<label for="password">Password*</label>
		<input id="password" type="password" name="password" required>
		<br>
		<label for="portfolio">Portfolio URL</label>
		<input id="portfolio" type="url" name="portfolio">
		<br>
		<button type="button">Submit Button</button>
		
		
		
	</form>





    <script type="text/javascript" src="./script.js">
</script>

</body>

</html>
